# long-bot/render.yaml  ← положи этот файл сюда
services:
  - type: web
    name: liq-long-bot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.8"

      # ═══ SECRETS ═══
      - key: REDIS_URL
        sync: false
      - key: BINGX_API_KEY
        sync: false
      - key: BINGX_API_SECRET
        sync: false
      - key: LONG_TELEGRAM_BOT_TOKEN
        sync: false
      - key: LONG_TELEGRAM_CHAT_ID
        sync: false
      - key: LONG_TELEGRAM_TOPIC_ID
        sync: false
      - key: COINGLASS_API_KEY
        sync: false
      - key: PROXY_LIST
        sync: false         # нужен только если USE_BINANCE=true

      # ═══ СТРАТЕГИЯ ═══
      - key: MIN_LONG_SCORE
        value: "65"
      - key: LONG_SL_BUFFER
        value: "1.5"        # оптимум из backtest
      - key: LONG_LEVERAGE
        value: "5-50"
      - key: SCAN_INTERVAL
        value: "200"
      - key: MAX_LONG_POSITIONS
        value: "20"
      - key: RISK_PER_TRADE
        value: "0.0005"

      # ═══ WATCHLIST ═══
      - key: MIN_VOLUME_USDT
        value: "1000000"    # ✅ 1M$ фильтр мусора
      - key: MAX_WATCHLIST
        value: "300"

      # ═══ БИРЖ / ДАННЫЕ ═══
      - key: AUTO_TRADING_ENABLED
        value: "true"
      - key: BINGX_DEMO_MODE
        value: "true"
      - key: USE_BINANCE
        value: "false"      # false = Bybit. true = Binance (нужен PROXY_LIST)
      - key: USE_SMC
        value: "true"

      # ═══ TRAILING / BE ═══
      - key: ENABLE_BE_AFTER_TP1
        value: "true"
      - key: TRAIL_DISTANCE_PERCENT
        value: "0.8"
      - key: BE_BUFFER_PERCENT
        value: "0.1"
