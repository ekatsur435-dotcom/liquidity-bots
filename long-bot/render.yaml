services:
  - type: web
    name: liq-long-bot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"

      # ── Redis ──────────────────────────────────────────────────────────────
      - key: REDIS_URL
        sync: false

      # ── Binance (рыночные данные) ──────────────────────────────────────────
      - key: BINANCE_API_KEY
        sync: false
      - key: BINANCE_API_SECRET
        sync: false

      # ── BingX (исполнение сделок) ─────────────────────────────────────────
      - key: BINGX_API_KEY
        sync: false
      - key: BINGX_API_SECRET
        sync: false

      # ── Telegram ──────────────────────────────────────────────────────────
      - key: LONG_TELEGRAM_BOT_TOKEN
        sync: false
      - key: LONG_TELEGRAM_CHAT_ID
        sync: false
      - key: LONG_TELEGRAM_TOPIC_ID
        sync: false

      # ── CoinGlass ─────────────────────────────────────────────────────────
      - key: COINGLASS_API_KEY
        sync: false

      # ── Сканер ────────────────────────────────────────────────────────────
      - key: SCAN_INTERVAL
        value: "200"            # 200 секунд между сканами
      - key: MIN_LONG_SCORE
        value: "65"
      - key: LONG_LEVERAGE
        value: "5-50"
      - key: LONG_SL_BUFFER
        value: "1.5"

      # ── Позиции ───────────────────────────────────────────────────────────
      - key: MAX_LONG_POSITIONS
        value: "20"
      - key: MIN_VOLUME_USDT
        value: "300000"         # $300K минимальный объём (было 5M → слишком мало монет)
      - key: MAX_WATCHLIST
        value: "300"            # 300 монет для сканирования

      # ── BingX торговля ────────────────────────────────────────────────────
      - key: AUTO_TRADING_ENABLED
        value: "true"
      - key: BINGX_DEMO_MODE
        value: "true"           # DEMO — VST аккаунт
      - key: RISK_PER_TRADE
        value: "0.0005"         # 0.05% от баланса на сделку

      # ── SMC/ICT анализ ────────────────────────────────────────────────────
      - key: USE_SMC
        value: "true"

    healthCheckPath: /health
    autoDeploy: true
