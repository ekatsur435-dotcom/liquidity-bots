services:
  - type: web
    name: liq-long-bot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: REDIS_URL
        sync: false
      - key: BINANCE_API_KEY
        sync: false
      - key: BINANCE_API_SECRET
        sync: false
      - key: LONG_TELEGRAM_BOT_TOKEN
        sync: false
      - key: LONG_TELEGRAM_CHAT_ID
        sync: false
      - key: LONG_TELEGRAM_TOPIC_ID
        sync: false
      - key: COINGLASS_API_KEY
        sync: false
      - key: SCAN_INTERVAL
        value: "120"
      - key: MIN_LONG_SCORE
        value: "65"
      - key: LONG_LEVERAGE
        value: "5-10"
      - key: LONG_SL_BUFFER
        value: "1.5"
      - key: MAX_LONG_POSITIONS
        value: "10"
    healthCheckPath: /health
    autoDeploy: true
