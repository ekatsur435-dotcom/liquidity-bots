# Render.com — Auto-deploy configuration for all 3 services
# GitHub → Render auto-deploy on push to main

services:
  - type: web
    name: liq-longbot
    runtime: python
    rootDir: long-bot
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: BINGX_API_KEY
        sync: false
      - key: BINGX_API_SECRET
        sync: false
      - key: BINGX_SECRET_KEY
        sync: false
      - key: BINGX_DEMO_MODE
        value: "true"
      - key: AUTO_TRADING_ENABLED
        value: "true"
      - key: MIN_LONG_SCORE
        value: "65"
      - key: LONG_SL_BUFFER
        value: "1.5"
      - key: MAX_LONG_POSITIONS
        value: "20"
      - key: SCAN_INTERVAL
        value: "120"
      - key: DAILY_LOSS_STOP_PCT
        value: "-5.0"
      - key: BLOCK_ASIAN_SESSION
        value: "true"
      - key: BTC_CORRELATION_FILTER
        value: "false"

  - type: web
    name: liq-shortbot
    runtime: python
    rootDir: short-bot
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: BINGX_API_KEY
        sync: false
      - key: BINGX_API_SECRET
        sync: false
      - key: BINGX_SECRET_KEY
        sync: false
      - key: BINGX_DEMO_MODE
        value: "true"
      - key: AUTO_TRADING_ENABLED
        value: "true"
      - key: MIN_SHORT_SCORE
        value: "67"
      - key: SHORT_SL_BUFFER
        value: "1.5"
      - key: MAX_SHORT_POSITIONS
        value: "20"
      - key: SCAN_INTERVAL
        value: "120"
      - key: DAILY_LOSS_STOP_PCT
        value: "-5.0"
      - key: BLOCK_ASIAN_SESSION
        value: "true"

  - type: web
    name: trading-dashboard
    runtime: python
    rootDir: dashboard
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -b 0.0.0.0:$PORT app:app
    healthCheckPath: /health
    envVars:
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
