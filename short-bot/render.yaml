services:
  - type: web
    name: liq-short-bot
    runtime: python
    plan: free
    rootDir: short-bot
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.8"

      # ── SECRETS (задай в Render Dashboard) ──
      - key: REDIS_URL
        sync: false
      - key: BINGX_API_KEY
        sync: false
      - key: BINGX_API_SECRET
        sync: false
      - key: SHORT_TELEGRAM_BOT_TOKEN
        sync: false
      - key: SHORT_TELEGRAM_CHAT_ID
        sync: false
      - key: SHORT_TELEGRAM_TOPIC_ID
        sync: false
      - key: COINGLASS_API_KEY
        sync: false

      # ── СТРАТЕГИЯ ──
      - key: MIN_SHORT_SCORE
        value: "60"
      - key: SHORT_SL_BUFFER
        value: "1.5"         # ✅ ИЗМЕНЕНО: было 2.5 → 1.5 (из backtest)
      - key: SHORT_LEVERAGE
        value: "5-50"
      - key: SCAN_INTERVAL
        value: "240"
      - key: MAX_SHORT_POSITIONS
        value: "20"

      # ── WATCHLIST ──
      - key: MIN_VOLUME_USDT
        value: "500000"
      - key: MAX_WATCHLIST
        value: "300"

      # ── TRADING ──
      - key: AUTO_TRADING_ENABLED
        value: "true"
      - key: BINGX_DEMO_MODE
        value: "true"
      - key: RISK_PER_TRADE
        value: "0.0005"      # 0.05% депозита на сделку

      # ── ФИЧИ ──
      - key: USE_SMC
        value: "true"
      - key: USE_BINANCE
        value: "false"       # Bybit (без прокси)

      # ── TRAILING / BE ──
      - key: SHORT_TRAIL_ACTIVATION
        value: "0.010"
      - key: ENABLE_BE_AFTER_TP1
        value: "true"        # ✅ BE после TP1 (из backtest)
      - key: TRAIL_DISTANCE_PERCENT
        value: "2.0"
      - key: BE_BUFFER_PERCENT
        value: "0.3"

      # ── ФИЛЬТРЫ ──
      - key: ENABLE_BTC_CORRELATION
        value: "true"
