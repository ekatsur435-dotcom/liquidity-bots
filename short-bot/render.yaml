# short-bot/render.yaml  ← положи этот файл сюда
services:
  - type: web
    name: liq-short-bot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.8"

      # ═══ SECRETS — НЕ МЕНЯТЬ ЗДЕСЬ, задавать в Dashboard ═══
      - key: REDIS_URL
        sync: false
      - key: BINGX_API_KEY
        sync: false
      - key: BINGX_API_SECRET
        sync: false
      - key: SHORT_TELEGRAM_BOT_TOKEN
        sync: false
      - key: SHORT_TELEGRAM_CHAT_ID
        sync: false
      - key: SHORT_TELEGRAM_TOPIC_ID
        sync: false
      - key: COINGLASS_API_KEY
        sync: false

      # ═══ СТРАТЕГИЯ ═══
      - key: MIN_SHORT_SCORE
        value: "60"
      - key: SHORT_SL_BUFFER
        value: "1.5"        # ✅ оптимум из backtest (было 2.5)
      - key: SHORT_LEVERAGE
        value: "5-50"
      - key: SCAN_INTERVAL
        value: "240"
      - key: MAX_SHORT_POSITIONS
        value: "20"
      - key: RISK_PER_TRADE
        value: "0.0005"

      # ═══ WATCHLIST ═══
      - key: MIN_VOLUME_USDT
        value: "150000"
      - key: MAX_WATCHLIST
        value: "300"

      # ═══ БИРЖ / ДАННЫЕ ═══
      - key: AUTO_TRADING_ENABLED
        value: "true"
      - key: BINGX_DEMO_MODE
        value: "true"
      - key: USE_BINANCE
        value: "false"      # Bybit без прокси — ключи не нужны
      - key: USE_SMC
        value: "true"

      # ═══ TRAILING / BE ═══
      - key: SHORT_TRAIL_ACTIVATION
        value: "0.010"
      - key: ENABLE_BE_AFTER_TP1
        value: "true"
      - key: TRAIL_DISTANCE_PERCENT
        value: "2.0"
      - key: BE_BUFFER_PERCENT
        value: "0.3"

      # ═══ ФИЛЬТРЫ ═══
      - key: ENABLE_BTC_CORRELATION
        value: "true"
