services:
  - type: web
    name: liq-short-bot
    runtime: python
    plan: free
    rootDir: short-bot
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.8"
      - key: REDIS_URL
        sync: false
      - key: BINGX_API_KEY
        sync: false
      - key: BINGX_API_SECRET
        sync: false
      - key: SHORT_TELEGRAM_BOT_TOKEN
        sync: false
      - key: SHORT_TELEGRAM_CHAT_ID
        sync: false
      - key: SHORT_TELEGRAM_TOPIC_ID
        sync: false
      - key: COINGLASS_API_KEY
        sync: false
      - key: MIN_SHORT_SCORE
        value: "65"
      - key: SHORT_SL_BUFFER
        value: "2.0"
      - key: MAX_SHORT_POSITIONS
        value: "20"
      - key: MIN_VOLUME_USDT
        value: "300000"
      - key: MAX_WATCHLIST
        value: "300"
      - key: SCAN_INTERVAL
        value: "180"
      - key: AUTO_TRADING_ENABLED
        value: "true"
      - key: BINGX_DEMO_MODE
        value: "true"
      - key: RISK_PER_TRADE
        value: "0.0005"
      - key: USE_SMC
        value: "true"
      - key: USE_BINANCE
        value: "false"
      - key: ENABLE_BE_AFTER_TP1
        value: "true"
      - key: SHORT_TRAIL_ACTIVATION
        value: "0.010"
      - key: ENABLE_BTC_CORRELATION
        value: "true"
      - key: PROXY_LIST
        sync: false
