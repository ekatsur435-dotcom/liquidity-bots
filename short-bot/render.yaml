services:
  - type: web
    name: liq-short-bot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: REDIS_URL
        sync: false  # Заполни из Upstash
      - key: BINANCE_API_KEY
        sync: false
      - key: BINANCE_API_SECRET
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: TELEGRAM_TOPIC_ID
        sync: false  # Опционально
      - key: SCAN_INTERVAL
        value: 60
      - key: MIN_SHORT_SCORE
        value: 65
      - key: SHORT_LEVERAGE
        value: 5-10
      - key: SHORT_SL_BUFFER
        value: 0.5
      - key: MAX_SHORT_POSITIONS
        value: 5
    healthCheckPath: /health
    autoDeploy: true
