services:
  - type: web
    name: liq-short-bot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"

      - key: REDIS_URL
        sync: false
      - key: BINANCE_API_KEY
        sync: false
      - key: BINANCE_API_SECRET
        sync: false
      - key: BINGX_API_KEY
        sync: false
      - key: BINGX_API_SECRET
        sync: false
      - key: SHORT_TELEGRAM_BOT_TOKEN
        sync: false
      - key: SHORT_TELEGRAM_CHAT_ID
        sync: false
      - key: SHORT_TELEGRAM_TOPIC_ID
        sync: false
      - key: COINGLASS_API_KEY
        sync: false

      - key: SCAN_INTERVAL
        value: "200"
      - key: MIN_SHORT_SCORE
        value: "60"             # Ниже чем LONG — SHORT сложнее найти
      - key: SHORT_LEVERAGE
        value: "5-50"
      - key: SHORT_SL_BUFFER
        value: "2.5"            # Шире SL для SHORT (контртрендовый)

      - key: MAX_SHORT_POSITIONS
        value: "20"
      - key: MIN_VOLUME_USDT
        value: "300000"
      - key: MAX_WATCHLIST
        value: "300"

      - key: AUTO_TRADING_ENABLED
        value: "true"
      - key: BINGX_DEMO_MODE
        value: "true"
      - key: RISK_PER_TRADE
        value: "0.0005"

      - key: USE_SMC
        value: "true"

      # SHORT-специфичные
      - key: SHORT_TRAIL_ACTIVATION
        value: "0.010"          # Трейлинг SHORT активируется при +1%

    healthCheckPath: /health
    autoDeploy: true
